server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: backend
            uri: http://localhost:9090
            predicates:
              - Path=/**
            
  security:
    oauth2:
      client:
        registration:
          entra:
            client-id: ""
            client-secret: ""
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            # Must match a Redirect URI registered on the Entra app.
            redirect-uri: "{baseUrl}/login/oauth2/code/entra"
        provider:
          entra:
            issuer-uri: ""

logging:
  level:
    "[org.springframework.security]": DEBUG
    "[org.springframework.cloud.gateway]": DEBUG
