logging:
  level:
    "[org.springframework.vault]": debug
    "[org.springframework.cloud.vault]": debug

spring:
  application:
    name: mongo-es-demo
  config:
    import: vault://
  cloud:
    vault:
      uri: ${spring.cloud.vault.uri}
      token: ${spring.cloud.vault.token}
      scheme: https
      kv:
        enabled: true
        backend: secret
        default-context: ${spring.application.name}
  mongodb:
    uri: ${spring.mongodb.uri}

# Elasticsearch RestClient configuration
elasticsearch:
  base-url:
  username: elastic
  password:
  # ssl-bundle: elastic-client   # set only for a self-signed ES cert (needs the
  #                              # spring.ssl.bundle.pem.elastic-client block + http_ca_crt_base64)
  ssl-bundle:

management:
  health:
    mongodb:
      enabled: false
