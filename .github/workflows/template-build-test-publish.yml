---
name: Shared Build, Test and Publish Template

on:
  workflow_call:
    inputs:
      # The module name, e.g. "notion-mongo-demo", which is used to determine the Dockerfile path and image name.
      module:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions: {}

jobs:
  build_and_scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF reports

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for testing and scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: "${{ inputs.module }}/Dockerfile"
          push: false
          load: true # Load the image into the local Docker daemon
          tags: ${{ github.run_id }}
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ github.run_id }}
          format: json
          output: trivy-report.json
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

      - name: Run Trivy for CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ github.run_id }}
          format: sarif
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.sarif
          scanners: vuln
          # CRITICAL: This flag is REQUIRED to make the exit code respect the 'severity' setting.
          # Without it, the step fails on ANY vulnerability when using SARIF format due
          # to a known issue in the action (aquasecurity/trivy-action#386). Do not remove.
          limit-severities-for-sarif: true
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true
          ignore-unfixed: true

      - name: Upload Trivy scan results to Github Security tab
        uses: github/codeql-action/upload-sarif@v4.35.1
        if: always() # Ensure results are uploaded even if the scan fails
        with:
          sarif_file: trivy-results.sarif

  publish:
    name: Publish Final Image
    runs-on: ubuntu-latest
    needs: build_and_scan
    environment: ci

    permissions:
      pull-requests: write # Required to post comments on PRs

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for final image build
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: "${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.module }}"
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Docker build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: "${{ inputs.module }}/Dockerfile"
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Find comment for image tags
        uses: peter-evans/find-comment@v4
        if: github.event_name == 'pull_request'
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Docker image tag(s) pushed"

      - name: Create or update comment for image tags
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ steps.fc.outputs.comment-id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Write the multiline body to a temporary file securely
          cat << 'EOF' > comment_body.txt
          Docker image tag(s) pushed:
          ```text
          ${{ steps.docker_meta.outputs.tags }}
          ```
          Labels added to images:
          ```text
          ${{ steps.docker_meta.outputs.labels }}
          ```
          EOF

          # 2. Check if we have an existing comment ID to update
          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment ($COMMENT_ID)..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/issues/comments/$COMMENT_ID" \
              -F body=@comment_body.txt
          else
            echo "Creating a new PR comment..."
            gh pr comment "$PR_NUMBER" --body-file comment_body.txt
          fi
