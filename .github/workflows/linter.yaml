---
name: "Lint and Format"

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request: null

permissions: {}

jobs:
  lint-and-fix:
    name: Lint and Fix
    runs-on: ubuntu-latest

    permissions:
      # To write linting fixes
      contents: write
      # To write Super-linter status checks
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0

      # Pre-populate Maven cache for Trivy
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven # caches ~/.m2/repository keyed on pom.xml hashes

      - name: Resolve Maven dependencies
        run: mvn -B -ntp dependency:go-offline # in batch mode and disables transfer progress bar

      - name: Expose Maven repo to super-linter container
        run: |
          mkdir -p /home/runner/work/_temp/_github_home
          cp -r "$HOME/.m2" /home/runner/work/_temp/_github_home/

      - name: Super-linter
        uses: super-linter/super-linter@v8.7.0
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_FILE_NAME: google_checks.xml
          JSCPD_FILE_NAME: .jscpd.json
          VALIDATE_NATURAL_LANGUAGE: false
          FIX_MARKDOWN_PRETTIER: true
          FIX_YAML_PRETTIER: true
          FIX_JSON_PRETTIER: true
          FIX_BIOME_FORMAT: true
          TRIVY_SKIP_VERSION_CHECK: "true"
          TRIVY_NO_PROGRESS: "true"
          TRIVY_QUIET: "true"
          VALIDATE_GITLEAKS: false

      - name: Commit and push linting fixes
        if: >
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
