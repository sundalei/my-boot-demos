---
name: "Build, Test, and Publish"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions: {}

jobs:
  build_and_scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF reports

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing and scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: notion-mongo-demo/Dockerfile
          push: false
          load: true # Load the image into the local Docker daemon
          tags: ${{ github.run_id }}
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ github.run_id }}
          format: json
          output: trivy-report.json
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

      - name: Run Trivy for CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ github.run_id }}
          format: sarif
          exit-code: 1
          vuln-type: os,library
          severity: CRITICAL
          output: trivy-results.sarif
          scanners: vuln
          # CRITICAL: This flag is REQUIRED to make the exit code respect the 'severity' setting.
          # Without it, the step fails on ANY vulnerability when using SARIF format due
          # to a known issue in the action (aquasecurity/trivy-action#386). Do not remove.
          limit-severities-for-sarif: true
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true
          ignore-unfixed: true

      - name: Upload Trivy scan results to Github Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() # Ensure results are uploaded even if the scan fails
        with:
          sarif_file: trivy-results.sarif

  publish:
    name: Publish Final Image
    runs-on: ubuntu-latest
    needs: build_and_scan

    permissions:
      pull-requests: write # Required to post comments on PRs

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for final image build
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/notion-mongo-demo
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Docker build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: notion-mongo-demo/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Find comment for image tags
        uses: peter-evans/find-comment@v4
        if: github.event_name == 'pull_request'
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Docker image tag(s) pushed"

      - name: Create or update comment for image tags
        uses: peter-evans/create-or-update-comment@v5
        if: github.event_name == 'pull_request'
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            Docker image tag(s) pushed:
            ```text
            ${{ steps.docker_meta.outputs.tags }}
            ```
            Labels added to images:
            ```text
            ${{ steps.docker_meta.outputs.labels }}
            ```
          edit-mode: replace
