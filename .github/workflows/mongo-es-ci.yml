---
name: "Mongo ES CI/CD"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "mongo-es-demo/**"
      - ".github/workflows/mongo-es-ci.yml"
      - ".github/workflows/template-build-test-publish.yml"
  pull_request:
    paths:
      - "mongo-es-demo/**"
      - ".github/workflows/mongo-es-ci.yml"
      - ".github/workflows/template-build-test-publish.yml"

permissions: {}

jobs:
  call-shared-workflow:
    uses: ./.github/workflows/template-build-test-publish.yml
    with:
      module: "mongo-es-demo"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      security-events: write # Required to upload SARIF reports
      pull-requests: write # Required to post comments on PRs
